name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  APP_NAME: workportal-app-auqexf
  RESOURCE_GROUP: workportal-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Prepare deployment package
        run: |
          # standalone ディレクトリに静的ファイルをコピー
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
          # .env を除外（App Settingsで管理）
          cd .next/standalone
          # シンボリックリンクを実体ファイルに変換してZIP作成
          zip -r ../../deploy.zip . --symlinks -x "*.map" -x "*.d.ts"
          echo "ZIP size: $(du -sh ../../deploy.zip | cut -f1)"
          echo "Files in ZIP: $(unzip -l ../../deploy.zip | tail -1)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              NODE_ENV=production \
              PORT=8080 \
              DATABASE_URL="${{ secrets.DATABASE_URL }}"

      - name: Set startup command
        run: |
          az webapp config set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --startup-file "node /home/site/wwwroot/server.js"

      - name: Stop app before deploy
        run: |
          az webapp stop \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Deploy via webapps-deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: deploy.zip

      - name: Verify node_modules via Kudu
        run: |
          KUDU_URL="https://${{ env.APP_NAME }}.scm.azurewebsites.net"
          PUBLISH_CREDS=$(az webapp deployment list-publishing-credentials \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            -o json)
          USER=$(echo $PUBLISH_CREDS | jq -r '.publishingUserName')
          PASS=$(echo $PUBLISH_CREDS | jq -r '.publishingPassword')
          RESULT=$(curl -s -u "$USER:$PASS" "$KUDU_URL/api/vfs/site/wwwroot/node_modules/" | jq 'length')
          echo "node_modules count: $RESULT"
          if [ "$RESULT" -eq "0" ]; then
            echo "WARNING: node_modules is empty!"
            # node_modules をKuduコマンドで確認
            curl -s -X POST -u "$USER:$PASS" \
              -H "Content-Type: application/json" \
              -d '{"command":"ls /home/site/wwwroot/node_modules", "dir":"/home"}' \
              "$KUDU_URL/api/command"
          fi

      - name: Start app
        run: |
          az webapp start \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
          echo "App URL: https://${{ env.APP_NAME }}.azurewebsites.net"
