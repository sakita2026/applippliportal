name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  APP_NAME: workportal-app-auqexf
  RESOURCE_GROUP: workportal-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Prepare deployment package
        run: |
          # standalone ディレクトリに静的ファイルをコピー
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public 2>/dev/null || true
          # .env を除外（App Settingsで管理）
          cd .next/standalone
          # シンボリックリンクを実体ファイルに変換してZIP作成
          zip -r ../../deploy.zip . --symlinks -x "*.map" -x "*.d.ts"
          echo "ZIP size: $(du -sh ../../deploy.zip | cut -f1)"
          echo "Files in ZIP: $(unzip -l ../../deploy.zip | tail -1)"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              NODE_ENV=production \
              PORT=8080 \
              DATABASE_URL="${{ secrets.DATABASE_URL }}"

      - name: Set startup command
        run: |
          az webapp config set \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --startup-file "node /home/site/wwwroot/server.js"

      - name: Backup deploy.zip to Azure File Share
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          az storage file upload \
            --account-name applippliportal \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --share-name source \
            --source deploy.zip \
            --path "backups/deploy_${TIMESTAMP}.zip"
          echo "Backed up to: backups/deploy_${TIMESTAMP}.zip"

      - name: Stop app before deploy
        continue-on-error: true
        run: |
          az webapp stop \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Deploy via webapps-deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: deploy.zip

      - name: Start app
        if: always()
        run: |
          az webapp start \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
          echo "App URL: https://${{ env.APP_NAME }}.azurewebsites.net"
